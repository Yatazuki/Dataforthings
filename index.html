<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07080f; --bg2: #0d0f18; --card: #0f1119; --card-hover: #14161f;
  --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.13);
  --text: #eceef6; --muted: #555b6e;
  --accent: #00d4ff; --accent2: #b8ff00; --red: #ff3b3b;
}
html { scroll-behavior: smooth; }
body {
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 90% 40% at 50% 0%, rgba(0,212,255,0.055) 0%, transparent 65%),
    radial-gradient(ellipse 60% 30% at 80% 60%, rgba(139,92,246,0.04) 0%, transparent 60%);
}
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#1e2130; border-radius:3px; }

@keyframes float-orb    { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-20px) scale(1.04)} }
@keyframes slideInRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes dropDown     { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
@keyframes searchDrop   { from{opacity:0;transform:translateY(-6px) scaleY(0.95)} to{opacity:1;transform:none} }
@keyframes fadeIn       { from{opacity:0} to{opacity:1} }

.ha0,.ha1,.ha2,.ha3,.ha4 { opacity:1; }
.tab-in { opacity:1; }
.card-reveal { opacity:1; transform:none; }

/* Game card overlay effect */
.game-card-overlay {
  position:absolute; inset:0;
  background: linear-gradient(0deg, rgba(5,6,12,0.97) 0%, rgba(5,6,12,0.5) 40%, rgba(5,6,12,0.0) 70%);
  transition: opacity 0.3s ease;
}
.game-card-root:hover .game-card-overlay { opacity:0.85; }
</style>

/* ═══════════════════════════════ HELPERS ═══════════════════════════════ */
function useReveal(deps=[]) {
  // Cards are always visible — hook kept for API compatibility
  const ref = useRef(null);
  return ref;
}

function StarRating({rating}) {
  const full=Math.floor(rating); const half=rating%1>=0.5;
  return <span style={{display:"inline-flex",gap:2,alignItems:"center"}}>
    {[1,2,3,4,5].map(i=>(
      <svg key={i} width="14" height="14" viewBox="0 0 20 20">
        <polygon points="10,2 12.4,7.8 18.5,8.2 14,12.2 15.5,18.1 10,14.9 4.5,18.1 6,12.2 1.5,8.2 7.6,7.8"
          fill={i<=full?"#f59e0b":(i===full+1&&half?"url(#h)":"#2a2d40")}/>
        <defs><linearGradient id="h"><stop offset="50%" stopColor="#f59e0b"/><stop offset="50%" stopColor="#2a2d40"/></linearGradient></defs>
      </svg>
    ))}
  </span>;
}

function Badge({children,color="#8b5cf6",bg}) {
  return <span style={{fontSize:"9px",fontWeight:700,letterSpacing:"0.08em",color,background:bg||color+"22",padding:"2px 7px",borderRadius:"3px",textTransform:"uppercase"}}>{children}</span>;
}

function SvgIconBadge({label,accent,size=72}) {
  return <div style={{width:size,height:size,borderRadius:size*0.2,background:`linear-gradient(135deg,${accent}22,${accent}44)`,border:`1.5px solid ${accent}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
    <span style={{fontSize:label?.length>2?"12px":"20px",fontWeight:800,color:accent,letterSpacing:"-0.03em"}}>{label}</span>
  </div>;
}

function ImgOrIcon({item,height="100%",style={}}) {
  if(item.img) return <img src={item.img} alt={item.title} style={{width:"100%",height,objectFit:"cover",display:"block",...style}} onError={e=>{e.target.style.display="none";}}/>;
  return <div style={{width:"100%",height,background:item.imgBg||"#111",display:"flex",alignItems:"center",justifyContent:"center",...style}}><SvgIconBadge label={item.svgIcon} accent={item.accent} size={72}/></div>;
}

/* ═══════════════════════════════ CARDS ═══════════════════════════════ */
function GameCard({item,onClick}) {
  const [hov,setHov]=useState(false);
  return <div onClick={()=>onClick(item)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    className="card-reveal game-card-root"
    style={{borderRadius:"12px",overflow:"hidden",cursor:"pointer",position:"relative",
      border:`1px solid ${hov?"rgba(255,255,255,0.14)":"var(--border)"}`,
      transition:"border 0.22s,box-shadow 0.25s,transform 0.25s cubic-bezier(0.22,1,0.36,1)",
      transform:hov?"translateY(-6px) scale(1.01)":"none",
      boxShadow:hov?`0 24px 60px rgba(0,0,0,0.7),0 0 0 1px ${item.accent}33`:"0 4px 20px rgba(0,0,0,0.4)",
      height:280, background:item.imgBg||"#111",
    }}>
    {item.img && <img src={item.img} alt={item.title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"transform 0.5s ease",transform:hov?"scale(1.06)":"scale(1)"}} onError={e=>{e.target.style.display="none";}}/>}
    <div className="game-card-overlay"/>
    {/* Genre badge top-left */}
    <div style={{position:"absolute",top:12,left:12,zIndex:2}}><Badge color={item.accent}>{item.genre}</Badge></div>
    {/* Price badge top-right */}
    {item.originalPrice && <div style={{position:"absolute",top:12,right:12,zIndex:2}}><Badge color="#ff3b3b" bg="#ff3b3b22">SALE</Badge></div>}
    {/* Bottom info overlay */}
    <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"16px 16px 18px",zIndex:2}}>
      <div style={{fontSize:"14px",fontWeight:700,color:"#fff",lineHeight:1.35,marginBottom:8,textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{item.title}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:"16px",fontWeight:800,color:"var(--accent)"}}>{item.price}</span>
        {item.originalPrice&&<span style={{fontSize:"12px",color:"rgba(255,255,255,0.45)",textDecoration:"line-through"}}>{item.originalPrice}</span>}
      </div>
    </div>
  </div>;
}

function ToolCard({item,onClick}) {
  const [hov,setHov]=useState(false);
  return <div onClick={()=>onClick(item)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} className="card-reveal"
    style={{background:hov?"var(--card-hover)":"var(--card)",borderRadius:"12px",overflow:"hidden",cursor:"pointer",
      border:`1px solid ${hov?"var(--border-h)":"var(--border)"}`,
      transition:"background 0.22s,border 0.22s,box-shadow 0.25s,transform 0.25s cubic-bezier(0.22,1,0.36,1)",
      transform:hov?"translateY(-6px) scale(1.01)":"none",
      boxShadow:hov?`0 24px 60px rgba(0,0,0,0.6),0 0 0 1px ${item.accent}28`:"0 4px 20px rgba(0,0,0,0.3)"}}>
    {/* Icon area with gradient bg */}
    <div style={{height:140,position:"relative",overflow:"hidden",
      background:`linear-gradient(135deg, ${item.imgBg||"#111"} 0%, ${item.accent}18 100%)`,
      display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 70% 30%, ${item.accent}22 0%, transparent 65%)`}}/>
      <SvgIconBadge label={item.svgIcon} accent={item.accent} size={hov?76:68}/>
      <div style={{position:"absolute",top:10,left:10}}><Badge color={item.accent}>{item.genre}</Badge></div>
    </div>
    <div style={{padding:"14px 16px 18px"}}>
      <div style={{fontSize:"12px",fontWeight:500,color:"var(--muted)",marginBottom:6,lineHeight:1.4}}>{item.title}</div>
      <div style={{fontSize:"16px",fontWeight:800,color:"var(--text)"}}>{item.price}</div>
    </div>
  </div>;
}

function AnyCard({item,onClick}) {
  return item.type==="game" ? <GameCard item={item} onClick={onClick}/> : <ToolCard item={item} onClick={onClick}/>;
}

function NewReleaseRow({item,onClick,cart,addToCart}) {
  const [hov,setHov]=useState(false);
  const inCart=cart.some(c=>c.id===item.id);
  return <div onClick={()=>onClick(item)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} className="card-reveal"
    style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",
      background:hov?"var(--card-hover)":"var(--card)",borderRadius:"12px",cursor:"pointer",
      border:`1px solid ${hov?"var(--border-h)":"var(--border)"}`,
      transition:"background 0.2s,border 0.2s,box-shadow 0.22s,transform 0.22s cubic-bezier(0.22,1,0.36,1)",
      transform:hov?"translateX(5px)":"none",
      boxShadow:hov?"0 8px 32px rgba(0,0,0,0.4)":"0 2px 12px rgba(0,0,0,0.2)"}}>
    <div style={{width:56,height:56,borderRadius:10,overflow:"hidden",flexShrink:0,background:item.imgBg||"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid var(--border)"}}>
      {item.img
        ? <img src={item.img} alt={item.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";}}/>
        : <span style={{fontSize:item.svgIcon?.length>2?"9px":"15px",fontWeight:800,color:item.accent}}>{item.svgIcon}</span>}
    </div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:"10px",fontWeight:700,color:item.accent||"var(--muted)",letterSpacing:"0.08em",marginBottom:4}}>{item.genre||item.type?.toUpperCase()}</div>
      <div style={{fontSize:"13px",fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:3}}>{item.title}</div>
      <div style={{fontSize:"13px",fontWeight:800,color:"#fff"}}>{item.price}</div>
    </div>
    <button onClick={e=>{e.stopPropagation();addToCart(item);}}
      style={{width:34,height:34,borderRadius:"50%",border:`1px solid ${inCart?"var(--accent)":"var(--border)"}`,cursor:"pointer",
        background:inCart?"var(--accent)":"rgba(255,255,255,0.04)",
        color:inCart?"#000":"var(--muted)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",
        transition:"all 0.18s ease",flexShrink:0,fontWeight:700}}>{inCart?"✓":"+"}</button>
  </div>;
}

/* ═══════════════════════════════ CART SIDEBAR ═══════════════════════════════ */
function CartSidebar({cart,removeFromCart,onClose,onNavigate}) {
  const total = cart.reduce((s,p)=>{
    const n=parseFloat(p.price.replace(/[^0-9.]/g,""));
    return s+(isNaN(n)?0:n);
  },0);
  return <>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,backdropFilter:"blur(4px)",animation:"fadeIn 0.2s ease"}}/>
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:380,background:"#0f1120",borderLeft:"1px solid var(--border)",zIndex:201,display:"flex",flexDirection:"column",animation:"slideInRight 0.3s cubic-bezier(0.22,1,0.36,1)"}}>
      <div style={{padding:"20px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

      <div style={{flex:1,overflowY:"auto",padding:"16px 24px",display:"flex",flexDirection:"column",gap:12}}>

              <div style={{fontSize:"40px",marginBottom:12}}>🛒</div>

              </div>
              <div style={{flex:1,minWidth:0}}>

              <button onClick={()=>removeFromCart(item.id)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"16px",padding:"0 4px",flexShrink:0,transition:"color 0.15s"}}
                onMouseEnter={e=>e.target.style.color="#ff4444"} onMouseLeave={e=>e.target.style.color="var(--muted)"}>✕</button>
            </div>
          ))
        }
      </div>
      {cart.length>0&&<div style={{padding:"16px 24px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{fontSize:"14px",color:"var(--muted)"}}>Total</span>
          <span style={{fontSize:"20px",fontWeight:800,color:"var(--text)"}}>${total.toFixed(2)}</span>
        </div>
        <button style={{width:"100%",padding:"14px",borderRadius:"10px",border:"none",cursor:"pointer",background:"var(--accent)",color:"#000",fontSize:"15px",fontWeight:700,transition:"all 0.18s ease"}}
          onMouseEnter={e=>e.currentTarget.style.background="#22d3ee"} onMouseLeave={e=>e.currentTarget.style.background="var(--accent)"}>
          Checkout →
        </button>
        <button onClick={onClose} style={{width:"100%",marginTop:8,padding:"10px",borderRadius:"10px",border:"1px solid var(--border)",cursor:"pointer",background:"transparent",color:"var(--muted)",fontSize:"13px",transition:"all 0.18s ease"}}
          onMouseEnter={e=>e.currentTarget.style.color="var(--text)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>
          Continue Shopping
        </button>
      </div>}
    </div>
  </>;
}

/* ═══════════════════════════════ SEARCH DROPDOWN ═══════════════════════════════ */
function SearchDropdown({query,onSelect,onClose}) {
  const results = query.length>1
    ? ALL_PRODUCTS.filter(p=>p.title.toLowerCase().includes(query.toLowerCase())||p.tags?.some(t=>t.toLowerCase().includes(query.toLowerCase()))).slice(0,6)
    : [];
  if(!results.length && query.length>1) return (
    <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,right:0,background:"#0f1120",border:"1px solid var(--border)",borderRadius:"12px",padding:"16px",zIndex:300,animation:"searchDrop 0.18s ease",boxShadow:"0 16px 48px rgba(0,0,0,0.6)"}}>
      <div style={{fontSize:"13px",color:"var(--muted)",textAlign:"center"}}>No results for "{query}"</div>
    </div>
  );
  if(!results.length) return null;
  return (
    <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,right:0,background:"#0f1120",border:"1px solid var(--border)",borderRadius:"12px",overflow:"hidden",zIndex:300,animation:"searchDrop 0.18s ease",boxShadow:"0 16px 48px rgba(0,0,0,0.6)"}}>
      <div style={{padding:"8px 0"}}>
        {results.map(p=>(
          <div key={p.id} onClick={()=>{onSelect(p);onClose();}}
            style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",transition:"background 0.12s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{width:36,height:36,borderRadius:6,overflow:"hidden",flexShrink:0,background:p.imgBg||"#111",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {p.img ? <img src={p.img} alt={p.title} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/> : <span style={{fontSize:"10px",fontWeight:800,color:p.accent}}>{p.svgIcon}</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"13px",fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.title}</div>
              <div style={{fontSize:"11px",color:"var(--muted)",marginTop:2}}>{p.type==="game"?"Game":"Software"} · {p.price}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{padding:"8px 16px",borderTop:"1px solid var(--border)",fontSize:"11px",color:"var(--muted)"}}>
        {results.length} result{results.length!==1?"s":""} for "{query}"
      </div>
    </div>
  );
}

/* ═══════════════════════════════ NAVBAR ═══════════════════════════════ */
const NAV_LINKS = ["Home","Games","Software","Deals","Business"];

function Navbar({onHome,onCategory,cartCount,onCartOpen}) {
  const [active,setActive]=useState("Home");

  const [searchFocus,setSearchFocus]=useState(false);
  const [scrolled,setScrolled]=useState(false);
  const [avatarOpen,setAvatarOpen]=useState(false);
  const searchRef=useRef(null);
  const avatarRef=useRef(null);

  useEffect(()=>{ const fn=()=>setScrolled(window.scrollY>40); window.addEventListener('scroll',fn,{passive:true}); return()=>window.removeEventListener('scroll',fn); },[]);

  useEffect(()=>{
    const fn=e=>{ if(avatarRef.current&&!avatarRef.current.contains(e.target))setAvatarOpen(false); };
    document.addEventListener('mousedown',fn); return()=>document.removeEventListener('mousedown',fn);
  },[]);

  function handleNav(link) {
    setActive(link);

    else if(link==="Software") onCategory("software","Software");

            border:`1px solid ${searchFocus?"rgba(0,212,255,0.4)":"rgba(255,255,255,0.08)"}`,
            borderRadius:"8px",padding:"6px 14px",transition:"all 0.18s ease"}}>
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
              <circle cx="9" cy="9" r="6" stroke="#6b7080" strokeWidth="2"/>
              <line x1="13.5" y1="13.5" x2="18" y2="18" stroke="#6b7080" strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <input value={searchVal} onChange={e=>setSearchVal(e.target.value)}
              onFocus={()=>setSearchFocus(true)} onBlur={()=>setTimeout(()=>setSearchFocus(false),150)}
              placeholder="Search..." style={{background:"none",border:"none",outline:"none",color:"var(--text)",fontSize:"13px",width:"100%"}}/>
            {searchVal&&<button onClick={()=>setSearchVal("")} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"14px",padding:0,lineHeight:1}}>×</button>}

              <div key={label} onClick={()=>setAvatarOpen(false)}

                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span>{icon}</span><span>{label}</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid var(--border)"}}>
              <div onClick={()=>setAvatarOpen(false)} style={{padding:"10px 16px",cursor:"pointer",fontSize:"13px",color:"#ff6b6b",display:"flex",alignItems:"center",gap:10,transition:"background 0.12s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,107,107,0.08)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span>🚪</span><span>Sign Out</span>
              </div>
            </div>
          </div>}
        </div>
      </div>
    </nav>
  );

          ? <img src={product.hero||product.img} alt={product.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block",filter:"brightness(0.55)"}} onError={e=>{e.target.style.display="none";}}/>
          : <div style={{width:"100%",height:"100%",background:product.imgBg,display:"flex",alignItems:"center",justifyContent:"center"}}><SvgIconBadge label={product.svgIcon} accent={product.accent} size={120}/></div>}
        <div style={{position:"absolute",inset:0,background:"linear-gradient(0deg,rgba(11,12,20,1) 0%,rgba(11,12,20,0.3) 60%,transparent 100%)"}}/>
        <button onClick={onBack} style={{position:"absolute",top:24,left:40,display:"flex",alignItems:"center",gap:8,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"8px",padding:"8px 16px",color:"var(--text)",cursor:"pointer",fontSize:"13px",fontWeight:500,transition:"all 0.18s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,0,0,0.7)";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(0,0,0,0.5)";}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Store
        </button>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 40px 36px"}}>
          <div style={{maxWidth:1280,margin:"0 auto"}}>
            <div style={{marginBottom:10,display:"flex",gap:8,flexWrap:"wrap"}}>{product.tags?.slice(0,4).map(t=><Badge key={t} color={product.accent}>{t}</Badge>)}</div>
            <h1 style={{fontSize:"42px",fontWeight:900,color:"#fff",letterSpacing:"-0.02em",lineHeight:1.1,marginBottom:10}}>{product.title}</h1>
            <div style={{display:"flex",alignItems:"center",gap:18}}>
              <StarRating rating={product.rating}/>
              <span style={{fontSize:"13px",color:"var(--muted)"}}>{product.rating}/5 · {(product.reviewCount/1000).toFixed(1)}K reviews</span>
              <span style={{fontSize:"12px",color:"var(--muted)"}}>by {product.developer}</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1280,margin:"0 auto",padding:"40px 40px 60px",display:"grid",gridTemplateColumns:"1fr 340px",gap:40,alignItems:"start"}}>
        <div>
          <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:32}}>
            {["overview","system-req","reviews"].map(tab=>(
              <button key={tab} onClick={()=>setActiveTab(tab)} style={{background:"none",border:"none",cursor:"pointer",padding:"12px 24px",fontSize:"13px",fontWeight:activeTab===tab?600:400,color:activeTab===tab?"var(--text)":"var(--muted)",borderBottom:`2px solid ${activeTab===tab?"var(--accent)":"transparent"}`,transition:"all 0.15s",marginBottom:-1}}>
                {{overview:"Overview","system-req":"System Req.","reviews":"Reviews"}[tab]}
              </button>
            ))}
          </div>

          {activeTab==="overview"&&<div key="ov" className="tab-in">
            {(product.screenshots||[]).length>0&&<div style={{marginBottom:32}}>
              <h3 style={{fontSize:"16px",fontWeight:700,marginBottom:14}}>Screenshots</h3>
              <div style={{borderRadius:10,overflow:"hidden",aspectRatio:"16/9",marginBottom:10}}>
                <img src={product.screenshots[ssIdx]} alt="screenshot" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                {product.screenshots.map((s,i)=>(
                  <div key={i} onClick={()=>setSsIdx(i)} style={{width:80,height:50,borderRadius:6,overflow:"hidden",cursor:"pointer",border:`2px solid ${ssIdx===i?"var(--accent)":"transparent"}`,flexShrink:0}}>
                    <img src={s} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>
                  </div>
                ))}
              </div>
            </div>}
            <h3 style={{fontSize:"16px",fontWeight:700,marginBottom:12}}>About</h3>
            <p style={{fontSize:"14px",color:"#b0b8cc",lineHeight:1.75,marginBottom:16}}>{product.description}</p>
            <p style={{fontSize:"14px",color:"#8892a4",lineHeight:1.75}}>{product.longDescription}</p>
          </div>}

          {activeTab==="system-req"&&product.sysReq&&<div key="sr" className="tab-in">
            <h3 style={{fontSize:"16px",fontWeight:700,marginBottom:20}}>Minimum Requirements</h3>
            {Object.entries(product.sysReq).map(([k,v])=>(
              <div key={k} style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:16,padding:"14px 0",borderBottom:"1px solid var(--border)"}}>
                <span style={{fontSize:"12px",fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{k}</span>
                <span style={{fontSize:"13px",color:"var(--text)"}}>{v}</span>
              </div>
            ))}
          </div>}

          {activeTab==="reviews"&&<div key="rv" className="tab-in">
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:40,marginBottom:32,alignItems:"center"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:"64px",fontWeight:900,lineHeight:1}}>{product.rating}</div>
                <StarRating rating={product.rating}/>
                <div style={{fontSize:"12px",color:"var(--muted)",marginTop:6}}>{(product.reviewCount/1000).toFixed(1)}K reviews</div>
              </div>
              <div>
                <ReviewBar label="5★" pct={Math.round(product.rating/5*80+10)}/>
                <ReviewBar label="4★" pct={Math.round((5-product.rating)*30)}/>
                <ReviewBar label="3★" pct={8}/><ReviewBar label="2★" pct={4}/><ReviewBar label="1★" pct={2}/>
              </div>
            </div>
            {[{name:"Alex M.",date:"Mar 2025",text:"Absolutely stunning. The world-building is incredible and the combat feels satisfying throughout.",stars:5},
              {name:"Sam K.",date:"Feb 2025",text:"Great experience overall. A few performance issues at launch but those have been patched.",stars:4},
              {name:"Jordan R.",date:"Jan 2025",text:"Worth every penny. The story kept me hooked for 80+ hours.",stars:5}].map((r,i)=>(
              <div key={i} style={{padding:"20px 0",borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:`hsl(${i*80+180},50%,40%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700}}>{r.name[0]}</div>
                    <span style={{fontSize:"13px",fontWeight:600}}>{r.name}</span>
                  </div>
                  <span style={{fontSize:"12px",color:"var(--muted)"}}>{r.date}</span>
                </div>
                <StarRating rating={r.stars}/>
                <p style={{fontSize:"13px",color:"#9aa0b4",marginTop:8,lineHeight:1.65}}>{r.text}</p>
              </div>
            ))}
          </div>}

          {related.length>0&&<div style={{marginTop:48}}>
            <h3 style={{fontSize:"16px",fontWeight:700,marginBottom:20}}>You might also like</h3>
            <div ref={relatedRef} style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
              {related.map(p=><AnyCard key={p.id} item={p} onClick={onNavigate}/>)}
            </div>
          </div>}
        </div>

        {/* Sidebar */}
        <div style={{position:"sticky",top:80}}>
          <div style={{background:"var(--card)",borderRadius:"14px",padding:24,border:"1px solid var(--border)",marginBottom:16}}>
            <div style={{borderRadius:10,overflow:"hidden",marginBottom:20,height:product.img?220:120,background:product.imgBg||"#111",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {product.img
                ? <img src={product.img} alt={product.title} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>
                : <SvgIconBadge label={product.svgIcon} accent={product.accent} size={80}/>}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
              <span style={{fontSize:"28px",fontWeight:900,color:"var(--text)"}}>{product.price}</span>
              {product.originalPrice&&<span style={{fontSize:"14px",color:"var(--muted)",textDecoration:"line-through"}}>{product.originalPrice}</span>}
            </div>
            {product.originalPrice&&<div style={{marginBottom:12}}><Badge color="#ff4444" bg="#ff444422">SALE — {Math.round((1-parseFloat(product.price.replace(/[^0-9.]/g,""))/parseFloat(product.originalPrice.replace(/[^0-9.]/g,"")))*100)}% OFF</Badge></div>}
            <button onClick={()=>addToCart(product)}
              onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.02)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";}}
              onMouseDown={e=>{e.currentTarget.style.transform="scale(0.96)";}}
              onMouseUp={e=>{e.currentTarget.style.transform="scale(1.02)";}}
              style={{width:"100%",padding:"14px",borderRadius:"10px",border:"none",cursor:"pointer",background:inCart?"#0aaf6e":"var(--accent)",color:"#000",fontSize:"15px",fontWeight:700,marginBottom:10,transition:"background 0.3s,box-shadow 0.3s,transform 0.15s",boxShadow:inCart?"0 0 20px rgba(10,175,110,0.4)":"0 0 20px rgba(0,212,255,0.25)"}}>
              {inCart?"✓ In Cart — Add Again":"Add to Cart"}
            </button>
            <button onClick={()=>setInWish(w=>!w)}
              style={{width:"100%",padding:"12px",borderRadius:"10px",cursor:"pointer",background:"transparent",border:`1px solid ${inWish?"var(--accent2)":"rgba(255,255,255,0.12)"}`,color:inWish?"var(--accent2)":"var(--muted)",fontSize:"13px",fontWeight:500,transition:"all 0.18s"}}>
              {inWish?"♥ Wishlisted":"♡ Add to Wishlist"}
            </button>
          </div>
          <div style={{background:"var(--card)",borderRadius:"14px",padding:24,border:"1px solid var(--border)"}}>
            {[["Developer",product.developer],["Publisher",product.publisher],["Release Date",product.releaseDate],["Platform","PC / Windows"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <span style={{fontSize:"12px",color:"var(--muted)",fontWeight:500}}>{k}</span>
                <span style={{fontSize:"12px",color:"var(--text)",fontWeight:500,textAlign:"right",maxWidth:"55%"}}>{v}</span>
              </div>
            ))}
            <div style={{marginTop:16}}>
              <div style={{fontSize:"12px",color:"var(--muted)",marginBottom:8,fontWeight:500}}>Tags</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {product.tags?.map(t=><span key={t} style={{fontSize:"11px",color:"var(--muted)",background:"rgba(255,255,255,0.06)",padding:"3px 8px",borderRadius:"4px"}}>{t}</span>)}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════ HOMEPAGE ═══════════════════════════════ */
function SectionHeader({title,subtitle,onSeeAll}) {
  const [hov,setHov]=useState(false);
  return <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:24}}>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      {subtitle&&<div style={{width:3,height:32,background:"var(--accent)",borderRadius:2,flexShrink:0}}/>}
      <div>
        <h2 style={{fontSize:"22px",fontWeight:800,color:"var(--text)",letterSpacing:"-0.02em"}}>{title}</h2>
        {subtitle&&<div style={{fontSize:"11px",fontWeight:600,color:"var(--accent)",letterSpacing:"0.1em",marginTop:3}}>{subtitle}</div>}
      </div>
    </div>
    <span onClick={onSeeAll} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{fontSize:"13px",fontWeight:600,color:hov?"var(--accent)":"var(--muted)",cursor:"pointer",transition:"color 0.15s",display:"flex",alignItems:"center",gap:4}}>
      See All <span style={{display:"inline-block",transition:"transform 0.2s",transform:hov?"translateX(3px)":"none"}}>→</span>
    </span>
  </div>;
}

function Homepage({onNavigate,onCategory,cart,addToCart}) {
  const games=ALL_PRODUCTS.filter(p=>p.type==="game").slice(0,4);
  const tools=ALL_PRODUCTS.filter(p=>p.type==="software").slice(0,4);
  const deals=ALL_PRODUCTS.filter(p=>p.originalPrice).slice(0,4);
  const newReleases=ALL_PRODUCTS.slice(6,10);
  const gamesRef=useReveal([]);
  const toolsRef=useReveal([]);
  const dealsRef=useReveal([]);
  const newRef=useReveal([]);

  return <>
    <Hero onClick={onNavigate}/>
    <main style={{maxWidth:1280,margin:"0 auto",padding:"56px 40px"}}>
      <section style={{marginBottom:64}}>
        <SectionHeader title="Top Elite Games" subtitle="EDITOR'S PICK" onSeeAll={()=>onCategory("game","Top Games")}/>
        <div ref={gamesRef} style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:18}}>
          {games.map(g=><GameCard key={g.id} item={g} onClick={onNavigate}/>)}
        </div>
      </section>
      <section style={{marginBottom:64}}>
        <SectionHeader title="Featured Dev Tools" subtitle="PROFESSIONAL GRADE" onSeeAll={()=>onCategory("software","Dev Tools")}/>
        <div ref={toolsRef} style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:18}}>
          {tools.map(t=><ToolCard key={t.id} item={t} onClick={onNavigate}/>)}
        </div>
      </section>
      <section style={{marginBottom:64}}>
        <SectionHeader title="Weekly Deals" subtitle="FLASH SALE" onSeeAll={()=>onCategory("deals","Weekly Deals")}/>
        <div ref={dealsRef} style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:18}}>
          {deals.map(d=><AnyCard key={d.id} item={d} onClick={onNavigate}/>)}
        </div>
      </section>
      <section style={{marginBottom:24}}>
        <SectionHeader title="New Releases" onSeeAll={()=>onCategory("game","New Releases")}/>
        <div ref={newRef} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {newReleases.map(r=><NewReleaseRow key={r.id} item={r} onClick={onNavigate} cart={cart} addToCart={addToCart}/>)}
        </div>
      </section>
    </main>
  </>;
}

/* ═══════════════════════════════ FOOTER ═══════════════════════════════ */
function Footer() {
  return <footer style={{borderTop:"1px solid var(--border)",padding:"32px 40px",background:"rgba(0,0,0,0.5)",backdropFilter:"blur(10px)"}}>
    <div style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:40}}>
        <div style={{fontSize:"15px",fontWeight:800,letterSpacing:"-0.02em"}}><span style={{color:"var(--accent)"}}>Software</span>Vault</div>
        <div style={{display:"flex",gap:24}}>
          {["Privacy Policy","Terms","Refunds","Contact","Support"].map(l=>(
            <a key={l} href="#" style={{fontSize:"12px",color:"var(--muted)",textDecoration:"none",transition:"color 0.15s"}}
              onMouseEnter={e=>e.target.style.color="var(--text)"} onMouseLeave={e=>e.target.style.color="var(--muted)"}>{l}</a>
          ))}
        </div>
      </div>
      <div style={{fontSize:"12px",color:"var(--muted)"}}>© 2025 SoftwareVault, Inc.</div>
    </div>
  </footer>;
}

/* ═══════════════════════════════ APP ═══════════════════════════════ */
function App() {
  const [view,setView]=useState({type:"home",product:null,category:null,categoryTitle:""});
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [pageKey,setPageKey]=useState(0);
  const [entering,setEntering]=useState(true);

  function transition(fn) {
    setEntering(false);
    setTimeout(()=>{ fn(); setPageKey(k=>k+1); window.scrollTo({top:0}); setTimeout(()=>setEntering(true),20); },180);
  }

  function navigate(product) { transition(()=>setView({type:"product",product})); }
  function goHome() { transition(()=>setView({type:"home"})); }
  function goCategory(category,categoryTitle) { transition(()=>setView({type:"category",category,categoryTitle})); }

  function addToCart(product) {
    setCart(c=>[...c,product]);
    setCartOpen(true);
  }
  function removeFromCart(id) { setCart(c=>c.filter(p=>p.id!==id)); }

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <Navbar onHome={goHome} onCategory={goCategory} cartCount={cart.length} onCartOpen={()=>setCartOpen(true)}/>
      <div key={pageKey} style={{flex:1,opacity:entering?1:0,transform:entering?"none":"translateY(-10px) scale(0.99)",transition:entering?"opacity 0.38s cubic-bezier(0.22,1,0.36,1),transform 0.38s cubic-bezier(0.22,1,0.36,1)":"opacity 0.18s,transform 0.18s"}}>
        {view.type==="home"&&<Homepage onNavigate={navigate} onCategory={goCategory} cart={cart} addToCart={addToCart}/>}
        {view.type==="product"&&<ProductPage product={view.product} onBack={goHome} onNavigate={navigate} cart={cart} addToCart={addToCart}/>}
        {view.type==="category"&&<CategoryPage category={view.category} title={view.categoryTitle} onNavigate={navigate} onBack={goHome} cart={cart} addToCart={addToCart}/>}
      </div>
      <Footer/>
      {cartOpen&&<CartSidebar cart={cart} removeFromCart={removeFromCart} onClose={()=>setCartOpen(false)} onNavigate={p=>{navigate(p);setCartOpen(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
