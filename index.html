<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SoftwareVault — Digital Software Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --nav: #0f1623;
    --nav-border: rgba(255,255,255,0.07);
    --bg: #f7f6f4;
    --surface: #ffffff;
    --surface2: #f0efe d;
    --border: #e8e6e2;
    --text: #1a1814;
    --text2: #6b6760;
    --text3: #9b9893;
    --accent: oklch(52% 0.22 268);
    --accent-hover: oklch(46% 0.22 268);
    --accent-light: oklch(96% 0.04 268);
    --amber: oklch(68% 0.18 75);
    --amber-light: oklch(96% 0.05 75);
    --green: oklch(55% 0.18 145);
    --green-light: oklch(95% 0.04 145);
    --red: oklch(55% 0.20 25);
    --red-light: oklch(96% 0.04 25);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.10);
    --font-head: 'Sora', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.5; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }
  img { display: block; max-width: 100%; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  input { font-family: inherit; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  /* Gaming mode overrides */
  body.gaming {
    --bg: #080b10;
    --surface: #0e1420;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --text2: #8a90a0;
    --text3: #4a5060;
    --nav: #050709;
    --nav-border: rgba(0,200,255,0.12);
    --accent: oklch(62% 0.25 195);
    --accent-hover: oklch(55% 0.25 195);
    --accent-light: rgba(0,200,255,0.08);
    --amber: oklch(72% 0.22 55);
    --amber-light: rgba(255,180,0,0.1);
    --green: oklch(62% 0.22 145);
    --green-light: rgba(0,255,100,0.08);
    --red: oklch(60% 0.24 25);
    --red-light: rgba(255,50,50,0.08);
    --shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    --shadow-hover: 0 4px 24px rgba(0,200,255,0.15), 0 0 0 1px rgba(0,200,255,0.2);
    --font-head: 'Barlow Condensed', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
  }
  body.gaming ::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); }

  /* Animations */
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideDown { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.96); } to { opacity:1; transform:scale(1); } }
  @keyframes splitReveal { from { opacity:0; transform: scale(1.04); } to { opacity:1; transform:scale(1); } }
  @keyframes glowPulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
  @keyframes scanline { from { transform: translateY(-100%); } to { transform: translateY(100vh); } }
  .animate-in { animation: fadeIn 0.3s ease both; }

  /* Landing split styles */
  .split-landing { display:flex; height:100vh; overflow:hidden; cursor:default; }
  .split-side { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; transition: flex 0.55s cubic-bezier(0.77,0,0.18,1); }
  .split-side:hover { flex: 1.45; }
  .split-divider { width:2px; background:rgba(255,255,255,0.12); flex-shrink:0; position:relative; z-index:10; }
  .split-divider::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:36px; height:36px; border-radius:50%; background:#0f1623; border:2px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center; }

  /* Gaming card glow */
  body.gaming .game-card-glow:hover {
    box-shadow: 0 0 0 1px rgba(0,200,255,0.3), 0 8px 40px rgba(0,200,255,0.12), 0 2px 8px rgba(0,0,0,0.6) !important;
  }

  /* ─── Responsive shared classes ─── */
  .sv-page { max-width:1200px; margin:0 auto; padding:40px 32px; }
  .sv-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:16px; }
  .sv-narrow { max-width:760px; margin:0 auto; }

  @media (max-width: 860px) {
    .sv-page { padding:28px 18px; }
  }
  @media (max-width: 640px) {
    .sv-page { padding:20px 14px; }
    .sv-grid { grid-template-columns:repeat(2, 1fr); gap:10px; }
    .split-landing { flex-direction:column; height:auto; min-height:100vh; }
    .split-side { min-height:46vh; padding:32px 0; }
    .split-side:hover { flex:1; }
    .split-divider { width:100%; height:2px; }
  }
  @media (max-width: 400px) {
    .sv-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "indigo",
  "cardStyle": "shadow",
  "heroLayout": "split",
  "showRatings": true,
  "currency": "CHF"
}/*EDITMODE-END*/;

// ─── Utils ───────────────────────────────────────────────────────────────────
// Approximate conversion from base prices (stored in CHF) so the currency control actually works.
const FX_RATES = { CHF: 1, EUR: 1.04, USD: 1.11 };
const fmt = (n, currency) => {
  const cur = currency || window.__svCurrency || 'CHF';
  const rate = FX_RATES[cur] || 1;
  return new Intl.NumberFormat('de-CH', { style: 'currency', currency: cur, maximumFractionDigits: 2 }).format(n * rate);
};

// Single source of truth for what a cart line actually costs: the edition the user chose,
// falling back to the cheapest edition when none was explicitly selected.
const lineItemPrice = (item) =>
  item.chosenEdition ? item.chosenEdition.price : Math.min(...item.editions.map(e => e.price));
const lineItemEditionName = (item) =>
  item.chosenEdition ? item.chosenEdition.name : (item.editions.length > 1 ? item.editions.reduce((a, b) => a.price <= b.price ? a : b).name : item.editions[0].name);

const getBadge = (p) => {
  if (p.isNew) return 'New';
  if (p.isDeal) return 'Deal';
  if (p.reviews > 25000) return 'Bestseller';
  return null;
};

const useIsMobile = (bp = 760) => {
  const [m, setM] = React.useState(typeof window !== 'undefined' && window.innerWidth < bp);
  React.useEffect(() => {
    const on = () => setM(window.innerWidth < bp);
    on();
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, [bp]);
  return m;
};

const StarRating = ({ rating }) => {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  return (
    <span style={{ display:'flex', gap:2, alignItems:'center' }}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="12" height="12" viewBox="0 0 12 12">
          <polygon points="6,1 7.5,4.5 11,5 8.5,7.5 9.2,11 6,9.2 2.8,11 3.5,7.5 1,5 4.5,4.5"
            fill={i <= full ? 'var(--amber)' : (i === full+1 && half ? 'var(--amber)' : 'var(--border)')}
            opacity={i === full+1 && half ? 0.5 : 1}
          />
        </svg>
      ))}
    </span>
  );
};

const Badge = ({ text, type = 'default' }) => {
  const colors = {
    'New': { bg:'var(--accent-light)', color:'var(--accent)' },
    'Deal': { bg:'var(--amber-light)', color:'var(--amber)' },
    'Bestseller': { bg:'var(--green-light)', color:'var(--green)' },
    'Popular': { bg:'var(--red-light)', color:'var(--red)' },
    'default': { bg:'var(--border)', color:'var(--text2)' },
  };
  const c = colors[text] || colors.default;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center',
      padding:'2px 8px', borderRadius:99, fontSize:11, fontWeight:600,
      letterSpacing:'0.03em', textTransform:'uppercase',
      background: c.bg, color: c.color,
    }}>{text}</span>
  );
};

// Product card cover
const ProductCover = ({ product, size = 'md' }) => {
  const aspectRatio = size === 'sm' ? '1/1' : size === 'lg' ? '4/3' : '4/3';
  const borderRadius = size === 'sm' ? 8 : size === 'lg' ? 'var(--radius-lg) var(--radius-lg) 0 0' : 'var(--radius) var(--radius) 0 0';

  return (
    <div style={{
      width:'100%', aspectRatio,
      background: product.coverBg || `linear-gradient(135deg, ${product.color}22 0%, ${product.color}55 100%)`,
      borderRadius,
      display:'flex', alignItems:'center', justifyContent:'center',
      position:'relative', overflow:'hidden',
      borderBottom: size !== 'sm' ? '1px solid var(--border)' : 'none',
    }}>
      {product.coverSvg ? (
        <div
          style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}
          dangerouslySetInnerHTML={{ __html: product.coverSvg
            .replace('<svg ', '<svg width="100%" height="100%" style="position:absolute;inset:0;" ')
          }}
        />
      ) : (
        <>
          <div style={{ position:'absolute', width:'60%', aspectRatio:'1', borderRadius:'50%',
            background: product.color, opacity:0.12, top:'-20%', right:'-10%' }} />
          <div style={{
            fontFamily:'var(--font-body)', fontSize:10, color: product.color,
            fontWeight:700, textTransform:'uppercase', opacity:0.8,
            position:'relative', zIndex:1, textAlign:'center', padding:'0 8px',
          }}>
            {product.publisher}<br/>
            <span style={{ fontSize:14, fontWeight:800, opacity:1, letterSpacing:0, textTransform:'none', lineHeight:1.2 }}>
              {product.name}
            </span>
          </div>
        </>
      )}
    </div>
  );
};

// ─── Navbar ──────────────────────────────────────────────────────────────────
const Navbar = ({ page, setPage, searchQuery, setSearchQuery, wishlist, cart, onAction, onSignOut, user }) => {
  const [searchFocused, setSearchFocused] = React.useState(false);
  const [accountOpen, setAccountOpen] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const isMobile = useIsMobile();
  const go = (id) => { setPage(id); setMenuOpen(false); };
  const navItems = [
    { id:'home', label:'Home' },
    { id:'software', label:'Software' },
    { id:'deals', label:'Deals' },
    { id:'new', label:'New Releases' },
  ];
  return (
    <nav style={{
      background:'var(--nav)', color:'#fff',
      display:'flex', alignItems:'center', gap:0,
      padding: isMobile ? '0 16px' : '0 32px', height:56, position:'sticky', top:0, zIndex:100,
      borderBottom:'1px solid var(--nav-border)',
    }}>
      {/* Hamburger (mobile) */}
      {isMobile && (
        <button onClick={() => setMenuOpen(o => !o)} style={{
          padding:8, marginRight:4, color:'#fff', display:'flex',
        }}>
          {menuOpen ? (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
          ) : (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
          )}
        </button>
      )}
      {/* Logo */}
      <div onClick={() => go('home')} style={{
        fontFamily:'var(--font-head)', fontWeight:800, fontSize:18,
        letterSpacing:'-0.02em', cursor:'pointer', marginRight: isMobile ? 'auto' : 40, flexShrink:0,
        display:'flex', alignItems:'center', gap:8,
      }}>
        <span style={{
          background:'var(--accent)', width:26, height:26, borderRadius:6,
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:13, fontWeight:800,
        }}>SV</span>
        {!isMobile && <span>SoftwareVault</span>}
      </div>

      {/* Nav items (desktop) */}
      {!isMobile && (
      <div style={{ display:'flex', gap:4, flex:1 }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => setPage(item.id)} style={{
            padding:'6px 14px', borderRadius:'var(--radius-sm)',
            fontFamily:'var(--font-body)', fontSize:14, fontWeight: page === item.id ? 600 : 400,
            color: page === item.id ? '#fff' : 'rgba(255,255,255,0.6)',
            background: page === item.id ? 'rgba(255,255,255,0.1)' : 'transparent',
            transition:'var(--transition)',
          }}>{item.label}</button>
        ))}
      </div>
      )}

      {/* Search (desktop) */}
      {!isMobile && (
      <div style={{ position:'relative', marginRight:12 }}>
        <svg style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', opacity:0.4 }}
          width="15" height="15" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="white" strokeWidth="1.8"/>
          <path d="M13 13L17 17" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
        <input
          value={searchQuery}
          onChange={e => { setSearchQuery(e.target.value); setPage(e.target.value ? 'search' : 'home'); }}
          onFocus={() => setSearchFocused(true)}
          onBlur={() => setSearchFocused(false)}
          placeholder="Search products…"
          style={{
            background: searchFocused ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)',
            border:'1px solid', borderColor: searchFocused ? 'rgba(255,255,255,0.25)' : 'transparent',
            color:'#fff', borderRadius:'var(--radius-sm)', padding:'7px 12px 7px 32px',
            fontSize:13, outline:'none', width:200, transition:'var(--transition)',
          }}
        />
      </div>
      )}

      {/* Wishlist */}
      <button onClick={() => setPage('wishlist')} style={{
        position:'relative', padding:8, borderRadius:'var(--radius-sm)',
        color:'rgba(255,255,255,0.7)', transition:'var(--transition)',
        background: page === 'wishlist' ? 'rgba(255,255,255,0.1)' : 'transparent',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            stroke="currentColor" strokeWidth="1.8" fill={page==='wishlist' ? 'currentColor' : 'none'}/>
        </svg>
        {wishlist.length > 0 && (
          <span style={{
            position:'absolute', top:4, right:4, width:14, height:14, borderRadius:'50%',
            background:'var(--accent)', color:'#fff', fontSize:9, fontWeight:700,
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>{wishlist.length}</span>
        )}
      </button>

      {/* Cart */}
      <button onClick={() => setPage('cart')} style={{
        position:'relative', padding:8, borderRadius:'var(--radius-sm)',
        color:'rgba(255,255,255,0.7)', transition:'var(--transition)',
        background: page === 'cart' ? 'rgba(255,255,255,0.1)' : 'transparent',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" strokeWidth="1.8"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" strokeWidth="1.8"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" strokeWidth="1.8"/>
        </svg>
        {cart.length > 0 && (
          <span style={{
            position:'absolute', top:4, right:4, width:14, height:14, borderRadius:'50%',
            background:'var(--accent)', color:'#fff', fontSize:9, fontWeight:700,
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>{cart.length}</span>
        )}
      </button>

      {/* Account */}
      <div style={{ position:'relative', marginLeft:8 }}>
        <button onClick={() => setAccountOpen(o => !o)} style={{
          width:30, height:30, borderRadius:'50%',
          background:'linear-gradient(135deg, var(--accent), var(--amber))',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:12, fontWeight:700, color:'#fff', cursor:'pointer',
          border: accountOpen ? '2px solid rgba(255,255,255,0.5)' : '2px solid transparent',
        }}>{user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</button>
        {accountOpen && (
          <>
            <div onClick={() => setAccountOpen(false)} style={{ position:'fixed', inset:0, zIndex:90 }} />
            <div style={{
              position:'absolute', top:42, right:0, zIndex:95, width:220,
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:'var(--radius)', boxShadow:'var(--shadow-hover)',
              padding:8, animation:'slideDown 0.15s ease both',
            }}>
              <div style={{ padding:'10px 12px', borderBottom:'1px solid var(--border)', marginBottom:6 }}>
                <div style={{ fontWeight:600, fontSize:14, color:'var(--text)' }}>{user.name}</div>
                <div style={{ fontSize:12, color:'var(--text3)' }}>{user.email}</div>
              </div>
              {[
                { label:'My Wishlist', action:() => setPage('wishlist') },
                { label:'My Cart', action:() => setPage('cart') },
                { label:'Order History', action:() => setPage('orders') },
                { label:'Account Settings', action:() => setPage('settings') },
              ].map(item => (
                <button key={item.label} onClick={() => { item.action(); setAccountOpen(false); }} style={{
                  display:'block', width:'100%', textAlign:'left', padding:'8px 12px',
                  fontSize:13, color:'var(--text2)', borderRadius:'var(--radius-sm)',
                  background:'transparent', cursor:'pointer', transition:'var(--transition)',
                }}
                onMouseEnter={e => { e.currentTarget.style.background='var(--bg)'; e.currentTarget.style.color='var(--text)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--text2)'; }}
                >{item.label}</button>
              ))}
              <div style={{ borderTop:'1px solid var(--border)', marginTop:6, paddingTop:6 }}>
                <button onClick={() => { onSignOut(); setAccountOpen(false); }} style={{
                  display:'block', width:'100%', textAlign:'left', padding:'8px 12px',
                  fontSize:13, color:'var(--red)', borderRadius:'var(--radius-sm)',
                  background:'transparent', cursor:'pointer', fontWeight:500,
                }}>Sign Out</button>
              </div>
            </div>
          </>
        )}
      </div>

      {/* Switch store */}
      <button onClick={() => setPage('landing')} style={{
        marginLeft:12, padding:'7px 14px', borderRadius:'var(--radius-sm)',
        border:'1px solid rgba(255,255,255,0.15)', fontSize:12, fontWeight:600,
        color:'rgba(255,255,255,0.55)', transition:'var(--transition)',
        display:'flex', alignItems:'center', gap:5,
      }}
      onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.08)'; e.currentTarget.style.color='#fff'; }}
      onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='rgba(255,255,255,0.55)'; }}
      >
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
          <path d="M7 4L3 8l4 4M3 8h10M13 16l4-4-4-4M17 12H7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        Switch
      </button>
    </nav>
  );
};

// ─── Product Card ─────────────────────────────────────────────────────────────
const ProductCard = ({ product, onOpen, onWishlist, isWishlisted, onAddToCart, tweaks }) => {
  const [hovered, setHovered] = React.useState(false);
  const lowestPrice = Math.min(...product.editions.map(e => e.price));
  const hasDiscount = product.editions.some(e => e.originalPrice);
  const origPrice = product.editions.find(e => e.originalPrice)?.originalPrice;
  const discount = origPrice ? Math.round((1 - lowestPrice/origPrice)*100) : null;

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background:'var(--surface)', borderRadius:'var(--radius-lg)',
        border:'1px solid var(--border)',
        boxShadow: hovered
          ? (tweaks.cardStyle === 'flat' ? 'none' : 'var(--shadow-hover)')
          : (tweaks.cardStyle === 'flat' ? 'none' : 'var(--shadow)'),
        transform: hovered ? 'translateY(-3px)' : 'translateY(0)',
        transition:'var(--transition)', overflow:'hidden',
        cursor:'pointer', display:'flex', flexDirection:'column',
        animation:'fadeIn 0.3s ease both',
      }}
    >
      {/* Cover */}

// ─── Catalog Page (Games / Software / Deals) ────────────────────────────────
const CatalogPage = ({ category, onOpen, onWishlist, wishlist, onAddToCart, tweaks }) => {
  const [sortBy, setSortBy] = React.useState('popular');
  const [filterSub, setFilterSub] = React.useState('all');
  const [compareList, setCompareList] = React.useState([]);
  const [showCompare, setShowCompare] = React.useState(false);

  const allProducts = PRODUCTS.filter(p => {
    if (category === 'deals') return p.category === 'software' && p.isDeal;
    if (category === 'new') return p.category === 'software' && p.isNew;
    return p.category === 'software';
  });
  const subcats = ['all', ...new Set(allProducts.map(p => p.subcategory))];
  const filtered = allProducts.filter(p => filterSub === 'all' || p.subcategory === filterSub);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === 'price-asc') return Math.min(...a.editions.map(e=>e.price)) - Math.min(...b.editions.map(e=>e.price));
    if (sortBy === 'price-desc') return Math.min(...b.editions.map(e=>e.price)) - Math.min(...a.editions.map(e=>e.price));
    if (sortBy === 'rating') return b.rating - a.rating;
    return b.reviews - a.reviews;
  });

  const toggleCompare = (id) => {
    setCompareList(prev => prev.includes(id) ? prev.filter(x=>x!==id) : prev.length < 3 ? [...prev, id] : prev);
  };

  const titles = { software:'All Software', deals:'Deals & Offers', new:'New Releases' };

  return (
    <div className="sv-page animate-in">
      {/* Header */}
      <div style={{ marginBottom:32 }}>
        <h1 style={{ fontFamily:'var(--font-head)', fontWeight:800, fontSize:30, letterSpacing:'-0.02em', marginBottom:4 }}>
          {titles[category] || category}
        </h1>
        <p style={{ color:'var(--text3)', fontSize:14 }}>{sorted.length} products available</p>
      </div>

      {/* Filters + Sort bar */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        gap:16, marginBottom:28, flexWrap:'wrap',
      }}>
        {/* Subcategory chips */}
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {subcats.map(s => (
            <button key={s} onClick={() => setFilterSub(s)} style={{
              padding:'6px 14px', borderRadius:99, fontSize:13, fontWeight:500,
              background: filterSub === s ? 'var(--accent)' : 'var(--surface)',
              color: filterSub === s ? '#fff' : 'var(--text2)',
              border:'1px solid', borderColor: filterSub === s ? 'var(--accent)' : 'var(--border)',
              transition:'var(--transition)', cursor:'pointer',
            }}>{s === 'all' ? 'All' : s}</button>
          ))}
        </div>
        {/* Sort */}
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {compareList.length > 1 && (
            <button onClick={() => setShowCompare(true)} style={{
              padding:'6px 16px', borderRadius:'var(--radius-sm)', fontSize:13, fontWeight:600,
              background:'var(--amber-light)', color:'var(--amber)',
              border:'1px solid var(--amber)', cursor:'pointer', transition:'var(--transition)',
            }}>
              Compare ({compareList.length})
            </button>
          )}
          <span style={{ fontSize:13, color:'var(--text3)' }}>Sort:</span>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px',
            fontSize:13, background:'var(--surface)', color:'var(--text)', cursor:'pointer',
            outline:'none',
          }}>
            <option value="popular">Most Popular</option>
            <option value="rating">Highest Rated</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
          </select>
        </div>
      </div>

      {/* Grid */}
      <div className="sv-grid" style={{ marginBottom:40 }}>
        {sorted.map(p => (
          <div key={p.id} style={{ position:'relative' }}>
            <ProductCard product={p}
              onOpen={onOpen} onWishlist={onWishlist}
              isWishlisted={wishlist.includes(p.id)}
              onAddToCart={onAddToCart} tweaks={tweaks}
            />
            {/* Compare checkbox */}
            <button onClick={() => toggleCompare(p.id)} style={{
              position:'absolute', bottom:52, left:16, zIndex:2,
              fontSize:11, padding:'3px 9px', borderRadius:99, fontWeight:600,
              background: compareList.includes(p.id) ? 'var(--accent)' : 'rgba(255,255,255,0.9)',
              color: compareList.includes(p.id) ? '#fff' : 'var(--text3)',
              border:'1px solid', borderColor: compareList.includes(p.id) ? 'var(--accent)' : 'var(--border)',
              cursor:'pointer', transition:'var(--transition)',
              boxShadow:'0 2px 6px rgba(0,0,0,0.08)',
            }}>
              {compareList.includes(p.id) ? '✓ Compare' : '+ Compare'}
            </button>
          </div>
        ))}
      </div>

      {/* Compare Modal */}
      {showCompare && (
        <CompareModal
          products={PRODUCTS.filter(p => compareList.includes(p.id))}
          onClose={() => setShowCompare(false)}
          onAddToCart={onAddToCart}
        />
      )}
    </div>
  );
};

        {/* Header */}

          <h3 style={{ fontFamily:'var(--font-head)', fontWeight:700, fontSize:20 }}>
            Product Comparison
          </h3>
          <button onClick={onClose} style={{
            width:32, height:32, borderRadius:'50%', background:'var(--bg)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:18, color:'var(--text3)', cursor:'pointer',
          }}>×</button>
        </div>
        {/* Table */}
        <div style={{ padding:'24px 28px' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr>
                <th style={{ textAlign:'left', padding:'8px 12px', fontSize:12, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.05em', width:160 }}>Feature</th>
                {products.map(p => (
                  <th key={p.id} style={{ padding:'8px 12px', textAlign:'center' }}>
                    <div style={{ fontFamily:'var(--font-head)', fontWeight:700, fontSize:15 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:'var(--text3)', fontWeight:400, marginTop:2 }}>{p.publisher}</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {/* Price row */}
              <tr style={{ background:'var(--bg)' }}>
                <td style={{ padding:'12px', fontSize:13, fontWeight:600, color:'var(--text2)' }}>Price</td>
                {products.map(p => {
                  const low = Math.min(...p.editions.map(e=>e.price));
                  const high = Math.max(...p.editions.map(e=>e.price));
                  return (
                    <td key={p.id} style={{ padding:'12px', textAlign:'center' }}>
                      <div style={{ fontFamily:'var(--font-head)', fontWeight:800, fontSize:18, color:'var(--text)' }}>
                        {fmt(low)}
                      </div>
                      {low !== high && <div style={{ fontSize:11, color:'var(--text3)' }}>up to {fmt(high)}</div>}
                    </td>
                  );
                })}
              </tr>
              {/* Rating */}
              <tr>
                <td style={{ padding:'12px', fontSize:13, fontWeight:600, color:'var(--text2)' }}>Rating</td>
                {products.map(p => (
                  <td key={p.id} style={{ padding:'12px', textAlign:'center' }}>
                    <div style={{ display:'flex', justifyContent:'center', marginBottom:2 }}>
                      <StarRating rating={p.rating} />
                    </div>
                    <span style={{ fontSize:12, color:'var(--text3)' }}>{p.rating}/5</span>
                  </td>
                ))}
              </tr>
              {/* Editions */}
              <tr style={{ background:'var(--bg)' }}>
                <td style={{ padding:'12px', fontSize:13, fontWeight:600, color:'var(--text2)' }}>Editions</td>
                {products.map(p => (
                  <td key={p.id} style={{ padding:'12px', textAlign:'center' }}>
                    {p.editions.map(e => (
                      <div key={e.name} style={{ fontSize:12, color:'var(--text)', marginBottom:2 }}>
                        <span style={{ fontWeight:600 }}>{e.name}</span>
                        <span style={{ color:'var(--text3)' }}> — {fmt(e.price)}</span>
                      </div>
                    ))}
                  </td>
                ))}
              </tr>
              {/* Platform */}
              <tr>
                <td style={{ padding:'12px', fontSize:13, fontWeight:600, color:'var(--text2)' }}>Platform</td>
                {products.map(p => (
                  <td key={p.id} style={{ padding:'12px', textAlign:'center' }}>
                    {p.platform.map(pl => (
                      <span key={pl} style={{
                        display:'inline-block', fontSize:11, padding:'2px 7px', borderRadius:99,
                        background:'var(--bg)', color:'var(--text3)', border:'1px solid var(--border)',
                        margin:'2px',
                      }}>{pl}</span>
                    ))}
                  </td>
                ))}
              </tr>
              {/* Features */}
              {allFeatures.slice(0,8).map((feat, i) => (
                <tr key={feat} style={{ background: i%2===0 ? 'var(--bg)' : 'transparent' }}>
                  <td style={{ padding:'10px 12px', fontSize:13, color:'var(--text2)', fontWeight:500 }}>{feat}</td>

                      <td key={p.id} style={{ padding:'10px 12px', textAlign:'center' }}>

                          ? <span style={{ color:'var(--green)', fontSize:16 }}>✓</span>
                          : <span style={{ color:'var(--border)', fontSize:16 }}>–</span>

  const field = (label, key, placeholder, opts={}) => (
    <div style={{ flex: opts.flex || 1 }}>

      <input
        value={form[key]}

        placeholder={placeholder}
        style={{
          width:'100%', padding:'10px 12px', fontSize:14,
          border:'1px solid', borderColor: touched && opts.required && !form[key] ? 'var(--red)' : 'var(--border)',
          borderRadius:'var(--radius-sm)', outline:'none', background:'var(--surface)', color:'var(--text)',

const LicenseKey = ({ value }) => {
  const [copied, setCopied] = React.useState(false);
  const copy = () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1600); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(value).then(done).catch(done);
    } else {
      const ta = document.createElement('textarea');
      ta.value = value; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta); done();
    }
  };
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:2 }}>
      <code style={{ fontSize:12, color:'var(--green)', fontFamily:'monospace', letterSpacing:'0.05em' }}>{value}</code>
      <button onClick={copy} aria-label="Copy license key" style={{
        display:'inline-flex', alignItems:'center', gap:4, fontSize:11, fontWeight:600,
        color: copied ? 'var(--green)' : 'var(--accent)',
        background: copied ? 'var(--green-light)' : 'var(--accent-light)',
        border:'none', borderRadius:99, padding:'3px 9px', cursor:'pointer', transition:'var(--transition)',
      }}>
        {copied ? (
          <><svg width="11" height="11" viewBox="0 0 20 20" fill="none"><path d="M5 10l3 3 7-7" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>Copied</>
        ) : (
          <><svg width="11" height="11" viewBox="0 0 20 20" fill="none"><rect x="6" y="6" width="10" height="10" rx="2" stroke="currentColor" strokeWidth="1.6"/><path d="M4 13V4a1 1 0 011-1h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>Copy</>
        )}
      </button>
    </div>
  );
};

  const [hovered, setHovered] = React.useState(false);
  const lowestPrice = Math.min(...product.editions.map(e => e.price));
  const origPrice = product.editions.find(e => e.originalPrice)?.originalPrice;
  const discount = origPrice ? Math.round((1 - lowestPrice/origPrice)*100) : null;

  return (
    <div
      className="game-card-glow"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      onClick={() => onOpen(product)}
      style={{
        background: hovered ? '#111825' : '#0e1420',
        border: '1px solid',
        borderColor: hovered ? 'rgba(0,200,255,0.25)' : 'rgba(255,255,255,0.06)',
        borderRadius:4,
        boxShadow: hovered ? '0 0 0 1px rgba(0,200,255,0.2), 0 8px 40px rgba(0,200,255,0.1)' : '0 2px 12px rgba(0,0,0,0.4)',
        transition:'all 0.2s', cursor:'pointer', overflow:'hidden',
        display:'flex', flexDirection:'column',
        animation:'fadeIn 0.3s ease both',
        position:'relative',
      }}
    >
      {/* Scan line accent top */}
      <div style={{
        position:'absolute', top:0, left:0, right:0, height:2,
        background: hovered ? 'linear-gradient(90deg, transparent, oklch(62% 0.25 195), transparent)' : 'transparent',
        transition:'background 0.3s', zIndex:2,
      }} />

      {/* Cover */}
      <div style={{ position:'relative', aspectRatio:'16/9', overflow:'hidden' }}>
        <div style={{
          width:'100%', height:'100%',
          background: product.coverBg || `linear-gradient(135deg, ${product.color}22 0%, ${product.color}66 60%, #080b10 100%)`,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          position:'relative',
        }}>
          {product.coverSvg ? (
            <div style={{ position:'absolute', inset:0 }}
              dangerouslySetInnerHTML={{ __html: product.coverSvg
                .replace('<svg ', '<svg width="100%" height="100%" style="position:absolute;inset:0;" ')
              }}
            />
          ) : (
            <>
              <div style={{
                position:'absolute', width:'80%', aspectRatio:'1', borderRadius:'50%',
                background:product.color, opacity:0.08, top:'-20%', right:'-20%', filter:'blur(30px)',
              }} />
              <div style={{
                fontFamily:"'Barlow Condensed', sans-serif", fontWeight:800, fontSize:22,
                color:'rgba(255,255,255,0.9)', textAlign:'center', lineHeight:1.1,
                letterSpacing:'0.04em', textTransform:'uppercase', padding:'0 12px',
                textShadow:'0 2px 20px rgba(0,0,0,0.8)', zIndex:1,
              }}>{product.name}</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,0.35)', zIndex:1, marginTop:4, fontFamily:"'Rajdhani', sans-serif" }}>
                {product.publisher}
              </div>
            </>
          )}
        </div>
        {/* Badges */}
        <div style={{ position:'absolute', top:8, left:8, display:'flex', gap:4 }}>
          {getBadge(product) && (
            <span style={{
              fontSize:10, padding:'2px 7px', borderRadius:2, fontWeight:700,
              letterSpacing:'0.06em', textTransform:'uppercase',
              background: getBadge(product)==='Deal' ? 'var(--amber)' : getBadge(product)==='New' ? 'oklch(62% 0.25 195)' : 'rgba(255,255,255,0.15)',
              color: getBadge(product)==='Deal' ? '#000' : getBadge(product)==='New' ? '#000' : '#fff',
              fontFamily:"'Barlow Condensed', sans-serif",
            }}>{getBadge(product)}</span>
          )}
          {discount && (
            <span style={{
              fontSize:10, padding:'2px 7px', borderRadius:2, fontWeight:700,
              background:'var(--red)', color:'#fff',
              fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.04em',
            }}>-{discount}%</span>
          )}
        </div>
        {/* Wishlist */}
        <button onClick={e => { e.stopPropagation(); onWishlist(product.id); }} style={{
          position:'absolute', top:8, right:8,
          width:28, height:28, borderRadius:2,
          background: isWishlisted ? 'oklch(62% 0.25 195)' : 'rgba(0,0,0,0.6)',
          border:'1px solid rgba(0,200,255,0.2)',
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'all 0.15s',
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              stroke={isWishlisted ? '#000' : 'rgba(0,200,255,0.7)'}
              strokeWidth="1.8" fill={isWishlisted ? '#000' : 'none'}/>
          </svg>
        </button>
      </div>

      {/* Body */}
      <div style={{ padding:'12px 14px', flex:1, display:'flex', flexDirection:'column', gap:8 }}>
        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
          {product.tags.slice(0,2).map(t => (
            <span key={t} style={{
              fontSize:10, padding:'2px 7px', borderRadius:2,
              background:'rgba(0,200,255,0.06)', color:'rgba(0,200,255,0.5)',
              border:'1px solid rgba(0,200,255,0.1)',
              fontFamily:"'Rajdhani', sans-serif", fontWeight:600, letterSpacing:'0.04em',
              textTransform:'uppercase',
            }}>{t}</span>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <StarRating rating={product.rating} />
          <span style={{ fontSize:11, color:'rgba(255,255,255,0.3)', fontFamily:"'Rajdhani', sans-serif" }}>
            {product.rating}
          </span>
        </div>
      </div>

      {/* Footer */}
      <div style={{
        padding:'10px 14px', borderTop:'1px solid rgba(255,255,255,0.05)',
        display:'flex', alignItems:'center', justifyContent:'space-between',
      }}>
        <div>
          {origPrice && (
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.25)', textDecoration:'line-through', fontFamily:"'Rajdhani', sans-serif" }}>
              {fmt(origPrice)}
            </div>
          )}
          <div style={{
            fontFamily:"'Barlow Condensed', sans-serif", fontWeight:700, fontSize:20,
            color: hovered ? 'oklch(62% 0.25 195)' : '#fff', transition:'color 0.2s',
            letterSpacing:'0.02em',
          }}>{fmt(lowestPrice)}</div>
        </div>
        <button
          onClick={e => { e.stopPropagation(); onAddToCart(product); }}
          style={{
            background: hovered ? 'oklch(62% 0.25 195)' : 'rgba(0,200,255,0.08)',
            color: hovered ? '#000' : 'oklch(62% 0.25 195)',
            border:'1px solid rgba(0,200,255,0.3)', borderRadius:3,
            padding:'6px 14px', fontSize:13, fontWeight:700,
            fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.05em', textTransform:'uppercase',
            transition:'all 0.2s', cursor:'pointer',
          }}
        >Buy</button>
      </div>
    </div>
  );
};

// ─── Gaming Catalog Page ──────────────────────────────────────────────────────
const GamingCatalogPage = ({ category, onOpen, onWishlist, wishlist, onAddToCart }) => {
  const [sortBy, setSortBy] = React.useState('popular');
  const [filterSub, setFilterSub] = React.useState('all');
  const [compareList, setCompareList] = React.useState([]);
  const [showCompare, setShowCompare] = React.useState(false);

  const allProducts = PRODUCTS.filter(p => {
    if (category === 'deals') return p.category === 'games' && p.isDeal;
    if (category === 'new') return p.category === 'games' && p.isNew;
    return p.category === 'games';
  });
  const subcats = ['all', ...new Set(allProducts.map(p => p.subcategory))];
  const filtered = allProducts.filter(p => filterSub === 'all' || p.subcategory === filterSub);
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === 'price-asc') return Math.min(...a.editions.map(e=>e.price)) - Math.min(...b.editions.map(e=>e.price));
    if (sortBy === 'price-desc') return Math.min(...b.editions.map(e=>e.price)) - Math.min(...a.editions.map(e=>e.price));
    if (sortBy === 'rating') return b.rating - a.rating;
    return b.reviews - a.reviews;
  });

  const toggleCompare = (id) => {
    setCompareList(prev => prev.includes(id) ? prev.filter(x=>x!==id) : prev.length < 3 ? [...prev, id] : prev);
  };

  const titles = { games:'All Games', deals:'Deals', new:'New Releases' };

  return (
    <div className="sv-page animate-in">
      <div style={{ marginBottom:32 }}>
        <h1 style={{ fontFamily:"'Barlow Condensed', sans-serif", fontWeight:800, fontSize:36,
          letterSpacing:'0.04em', textTransform:'uppercase', color:'#fff', marginBottom:4 }}>
          {titles[category] || category}
        </h1>
        <p style={{ color:'rgba(0,200,255,0.4)', fontSize:14, fontFamily:"'Rajdhani', sans-serif" }}>
          {sorted.length} titles available
        </p>
      </div>
      {/* Filters */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, marginBottom:28, flexWrap:'wrap' }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {subcats.map(s => (
            <button key={s} onClick={() => setFilterSub(s)} style={{
              padding:'5px 14px', borderRadius:3, fontSize:13, fontWeight:600,
              fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.05em', textTransform:'uppercase',
              background: filterSub === s ? 'oklch(62% 0.25 195)' : 'rgba(0,200,255,0.05)',
              color: filterSub === s ? '#000' : 'rgba(0,200,255,0.5)',
              border:'1px solid', borderColor: filterSub === s ? 'oklch(62% 0.25 195)' : 'rgba(0,200,255,0.15)',
              cursor:'pointer', transition:'all 0.15s',
            }}>{s === 'all' ? 'All' : s}</button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {compareList.length > 1 && (
            <button onClick={() => setShowCompare(true)} style={{
              padding:'5px 14px', borderRadius:3, fontSize:13, fontWeight:700,
              fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.05em', textTransform:'uppercase',
              background:'rgba(255,180,0,0.1)', color:'var(--amber)',
              border:'1px solid var(--amber)', cursor:'pointer',
            }}>Compare ({compareList.length})</button>
          )}
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            border:'1px solid rgba(0,200,255,0.15)', borderRadius:3, padding:'6px 10px',
            fontSize:13, background:'rgba(0,200,255,0.05)', color:'rgba(0,200,255,0.6)',
            cursor:'pointer', outline:'none', fontFamily:"'Rajdhani', sans-serif",
          }}>
            <option value="popular">Most Popular</option>
            <option value="rating">Highest Rated</option>
            <option value="price-asc">Price ↑</option>
            <option value="price-desc">Price ↓</option>
          </select>
        </div>
      </div>
      <div className="sv-grid" style={{ marginBottom:40 }}>
        {sorted.map(p => (
          <div key={p.id} style={{ position:'relative' }}>
            <GamingProductCard product={p}
              onOpen={onOpen} onWishlist={onWishlist}
              isWishlisted={wishlist.includes(p.id)}
              onAddToCart={onAddToCart}
            />
            <button onClick={() => toggleCompare(p.id)} style={{
              position:'absolute', bottom:50, left:14, zIndex:2,
              fontSize:11, padding:'3px 8px', borderRadius:2, fontWeight:700,
              fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:'0.05em', textTransform:'uppercase',
              background: compareList.includes(p.id) ? 'oklch(62% 0.25 195)' : 'rgba(0,0,0,0.7)',
              color: compareList.includes(p.id) ? '#000' : 'rgba(0,200,255,0.5)',
              border:'1px solid rgba(0,200,255,0.2)', cursor:'pointer',
            }}>
              {compareList.includes(p.id) ? '✓ Compare' : '+ Compare'}
            </button>
          </div>
        ))}
      </div>
      {showCompare && (
        <CompareModal
          products={PRODUCTS.filter(p => compareList.includes(p.id))}
          onClose={() => setShowCompare(false)}
          onAddToCart={onAddToCart}
        />
      )}
    </div>
  );
};

  const [wishlist, setWishlist] = React.useState(['god-of-war', 'adobe-cc']);

  const [searchQuery, setSearchQuery] = React.useState('');

  React.useEffect(() => {
    if (mode === 'gaming') document.body.classList.add('gaming');
    else document.body.classList.remove('gaming');
  }, [mode]);

  // Keep the live currency in sync with the Tweaks control so all prices reformat.
  React.useEffect(() => {
    window.__svCurrency = tweaks.currency || 'CHF';
    setCart(c => c.slice()); // nudge a re-render so prices reformat immediately
  }, [tweaks.currency]);

  const chooseMode = (m) => { setMode(m); setPage('home'); };
  const goToLanding = () => { setMode('landing'); setPage('home'); };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const openProduct = (product) => {
    setDetailProduct(product);
    setPage('detail');
  };

  const toggleWishlist = (id) => {
    setWishlist(prev => {
      const next = prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id];
      showToast(prev.includes(id) ? 'Removed from wishlist' : 'Added to wishlist ❤️');
      return next;
    });
  };

  const addToCart = (product, edition) => {
    const chosen = edition || (product.editions.length > 1
      ? product.editions.reduce((a, b) => a.price <= b.price ? a : b)
      : product.editions[0]);
    setCart(prev => [...prev, { ...product, chosenEdition: chosen }]);
    showToast(`${product.name} added to cart 🛒`);
  };

  const removeFromCart = (index) => {
    setCart(prev => prev.filter((_, i) => i !== index));
  };

  const genKey = () => 'KEY-' + Math.random().toString(36).slice(2,7).toUpperCase() + '-' + Math.random().toString(36).slice(2,7).toUpperCase();
  const [orders, setOrders] = React.useState([]);
  const [settings, setSettings] = React.useState({
    name: 'Jane Doe', email: 'jane.doe@email.ch',
    notifyOrders: true, notifyDeals: true, newsletter: false,
    language: 'Deutsch', currency: 'CHF',
  });

  const [order, setOrder] = React.useState({ items: [], number: '', keys: [] });
  const placeOrder = () => {
    const number = 'SV-' + Date.now().toString().slice(-8);
    const keys = cart.map(() => genKey());
    const date = new Date().toLocaleDateString('de-CH', { day:'2-digit', month:'short', year:'numeric' });
    setOrder({ items: cart, number, keys });
    setOrders(prev => [{ number, date, items: cart, keys }, ...prev]);
    setCart([]);
    setPage('order-confirmed');
    window.scrollTo({ top: 0 });
  };

  const signOut = () => {
    setCart([]);
    setMode('landing');
    setPage('home');
    showToast("You've been signed out");
  };

  // ── Landing ──
  if (mode === 'landing') {
    return <SplitLanding onChoose={chooseMode} />;
  }

  // ── Gaming mode ──
  if (mode === 'gaming') {
    return (
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
        <GamingNavbar
          page={page} setPage={setPage}
          searchQuery={searchQuery} setSearchQuery={setSearchQuery}
          wishlist={wishlist} cart={cart}
          onBack={goToLanding} onAction={showToast} onSignOut={signOut} user={settings}
        />
        <main style={{ flex:1 }}>
          {page === 'home' && (
            <GamingHomePage setPage={setPage} onOpen={openProduct}
              onWishlist={toggleWishlist} wishlist={wishlist} onAddToCart={addToCart} />
          )}
          {page === 'games' && (
            <GamingCatalogPage category="games" onOpen={openProduct}
              onWishlist={toggleWishlist} wishlist={wishlist} onAddToCart={addToCart} />
          )}
          {page === 'deals' && (
            <GamingCatalogPage category="deals" onOpen={openProduct}
              onWishlist={toggleWishlist} wishlist={wishlist} onAddToCart={addToCart} />
          )}
          {page === 'new' && (
            <GamingCatalogPage category="new" onOpen={openProduct}
              onWishlist={toggleWishlist} wishlist={wishlist} onAddToCart={addToCart} />
          )}
          {page === 'detail' && detailProduct && (
            <ProductDetailPage
              product={detailProduct}
              onClose={() => setPage('home')}
              onWishlist={toggleWishlist}
              isWishlisted={wishlist.includes(detailProduct.id)}
              onAddToCart={addToCart}
            />
          )}
          {page === 'wishlist' && (
            <WishlistPage wishlist={wishlist} onOpen={openProduct}
              onWishlist={toggleWishlist} onAddToCart={addToCart}
            onBrowse={() => { setPage('home'); window.scrollTo({top:0}); }} tweaks={tweaks} />
          )}
          {page === 'cart' && (
            <CartPage cart={cart} onRemove={removeFromCart}
              onCheckout={() => { setPage('checkout'); window.scrollTo({top:0}); }}
            onBrowse={() => { setPage('home'); window.scrollTo({top:0}); }} />
          )}
          {page === 'checkout' && (
            <CheckoutPage cart={cart} onBack={() => setPage('cart')} onPlaceOrder={placeOrder} />
          )}
          {page === 'order-confirmed' && (
            <OrderConfirmedPage orderItems={order.items} orderNumber={order.number} orderKeys={order.keys}
              onContinue={() => setPage('home')} />
          )}
          {page === 'orders' && (
            <OrderHistoryPage orders={orders} onBack={() => setPage('home')} onContinue={() => setPage('games')} />
          )}
          {page === 'settings' && (
            <SettingsPage settings={settings} onSave={s => { setSettings(s); showToast('Settings saved'); }} onBack={() => setPage('home')} />
          )}
          {INFO_CONTENT[page] && (
            <InfoPage topic={page} onBack={() => setPage('home')} onNavigate={(id) => { setPage(id); window.scrollTo({top:0}); }} />
          )}
          {page === 'search' && (
            <SearchPage query={searchQuery} onOpen={openProduct}
              onWishlist={toggleWishlist} wishlist={wishlist}
              onAddToCart={addToCart} tweaks={tweaks} />
          )}
        </main>
        <GamingFooter onNavigate={(id) => { setPage(id); window.scrollTo({top:0}); }} />
        {toast && (
          <div style={{
            position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)',
            background:'#050709', color:'oklch(62% 0.25 195)',
            border:'1px solid rgba(0,200,255,0.25)',
            borderRadius:4, padding:'12px 24px', fontSize:14, fontWeight:600,
            boxShadow:'0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,200,255,0.1)',
            zIndex:300, animation:'slideDown 0.2s ease both', whiteSpace:'nowrap',
            fontFamily:"'Rajdhani', sans-serif", letterSpacing:'0.03em',
          }}>{toast}</div>
        )}
        <TweaksPanel>
          <TweakSection label="Content" />
          <TweakToggle label="Show Star Ratings" value={tweaks.showRatings}
            onChange={v => setTweak('showRatings', v)} />
        </TweaksPanel>
      </div>
    );
  }

  // ── Software mode ──
  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <Navbar
        page={page} setPage={p => { if(p==='landing') goToLanding(); else setPage(p); }}
        searchQuery={searchQuery} setSearchQuery={setSearchQuery}
        wishlist={wishlist} cart={cart} onAction={showToast} onSignOut={signOut} user={settings}
      />
      <main style={{ flex:1 }}>
        {page === 'home' && (
          <HomePage setPage={setPage} onOpen={openProduct}
            onWishlist={toggleWishlist} wishlist={wishlist}
            onAddToCart={addToCart} tweaks={tweaks} />
        )}
        {page === 'software' && (
          <CatalogPage category="software" onOpen={openProduct}
            onWishlist={toggleWishlist} wishlist={wishlist}
            onAddToCart={addToCart} tweaks={tweaks} />
        )}
        {page === 'deals' && (
          <CatalogPage category="deals" onOpen={openProduct}
            onWishlist={toggleWishlist} wishlist={wishlist}
            onAddToCart={addToCart} tweaks={tweaks} />
        )}
        {page === 'new' && (
          <CatalogPage category="new" onOpen={openProduct}
            onWishlist={toggleWishlist} wishlist={wishlist}
            onAddToCart={addToCart} tweaks={tweaks} />
        )}
        {page === 'detail' && detailProduct && (
          <ProductDetailPage
            product={detailProduct}
            onClose={() => setPage('home')}
            onWishlist={toggleWishlist}
            isWishlisted={wishlist.includes(detailProduct.id)}
            onAddToCart={addToCart}
          />
        )}
        {page === 'wishlist' && (
          <WishlistPage wishlist={wishlist} onOpen={openProduct}
            onWishlist={toggleWishlist} onAddToCart={addToCart}
            onBrowse={() => { setPage('home'); window.scrollTo({top:0}); }} tweaks={tweaks} />
        )}
        {page === 'cart' && (
          <CartPage cart={cart} onRemove={removeFromCart}
            onCheckout={() => { setPage('checkout'); window.scrollTo({top:0}); }}
            onBrowse={() => { setPage('home'); window.scrollTo({top:0}); }} />
        )}
        {page === 'checkout' && (
          <CheckoutPage cart={cart} onBack={() => setPage('cart')} onPlaceOrder={placeOrder} />
        )}
        {page === 'order-confirmed' && (
          <OrderConfirmedPage orderItems={order.items} orderNumber={order.number} orderKeys={order.keys}
            onContinue={() => setPage('home')} />
        )}
        {page === 'orders' && (
          <OrderHistoryPage orders={orders} onBack={() => setPage('home')} onContinue={() => setPage('software')} />
        )}
        {page === 'settings' && (
          <SettingsPage settings={settings} onSave={s => { setSettings(s); showToast('Settings saved'); }} onBack={() => setPage('home')} />
        )}
        {INFO_CONTENT[page] && (
          <InfoPage topic={page} onBack={() => setPage('home')} onNavigate={(id) => { setPage(id); window.scrollTo({top:0}); }} />
        )}
        {page === 'search' && (
          <SearchPage query={searchQuery} onOpen={openProduct}
            onWishlist={toggleWishlist} wishlist={wishlist}
            onAddToCart={addToCart} tweaks={tweaks} />
        )}
      </main>
      <Footer onNavigate={(id) => { setPage(id); window.scrollTo({top:0}); }} />
      {toast && (
        <div style={{
          position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)',
          background:'#1a1814', color:'#fff', borderRadius:'var(--radius-sm)',
          padding:'12px 24px', fontSize:14, fontWeight:500,
          boxShadow:'0 8px 32px rgba(0,0,0,0.2)', zIndex:300,
          animation:'slideDown 0.2s ease both', whiteSpace:'nowrap',
        }}>{toast}</div>
      )}
      <TweaksPanel>
        <TweakSection label="Visuals" />
        <TweakRadio label="Card Style" value={tweaks.cardStyle}
          options={['shadow','flat']}
          onChange={v => setTweak('cardStyle', v)} />
        <TweakRadio label="Hero" value={tweaks.heroLayout}
          options={['split','dark']}
          onChange={v => setTweak('heroLayout', v)} />
        <TweakSection label="Content" />
        <TweakToggle label="Show Star Ratings" value={tweaks.showRatings}
          onChange={v => setTweak('showRatings', v)} />
        <TweakSection label="Currency" />
        <TweakRadio label="Currency" value={tweaks.currency}
          options={['CHF','EUR','USD']}
          onChange={v => setTweak('currency', v)} />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
